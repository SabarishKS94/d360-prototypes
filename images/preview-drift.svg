<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <rect width="600" height="200" rx="8" fill="#f3f3f3"/>
  <text x="300" y="30" text-anchor="middle" font-family="system-ui" font-size="13" fill="#5c5c5c">Model Performance Over Time</text>
  <!-- Axis -->
  <line x1="60" y1="160" x2="560" y2="160" stroke="#c9c9c9" stroke-width="1"/>
  <line x1="60" y1="40" x2="60" y2="160" stroke="#c9c9c9" stroke-width="1"/>
  <!-- Stable line -->
  <polyline points="60,80 140,78 220,82 300,79 340,85 380,95 420,110 460,125 520,140 560,150" stroke="#0176d3" stroke-width="2" fill="none"/>
  <!-- Threshold -->
  <line x1="60" y1="120" x2="560" y2="120" stroke="#ea001e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="565" y="124" font-family="system-ui" font-size="10" fill="#ea001e">Threshold</text>
  <!-- Drift zone -->
  <rect x="380" y="40" width="180" height="120" rx="4" fill="#ea001e" opacity="0.05"/>
  <text x="470" y="55" text-anchor="middle" font-family="system-ui" font-size="10" fill="#ea001e">Drift Detected</text>
  <!-- Labels -->
  <text x="60" y="178" font-family="system-ui" font-size="10" fill="#5c5c5c">30 days ago</text>
  <text x="540" y="178" text-anchor="end" font-family="system-ui" font-size="10" fill="#5c5c5c">Today</text>
  <text x="40" y="84" text-anchor="end" font-family="system-ui" font-size="10" fill="#5c5c5c">AUC</text>
</svg>
