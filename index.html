<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1" />
    <title>Salesforce</title>
    <link rel="icon" href="./images/salesforce.svg" type="image/svg+xml">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./cosmos-theme.css">
</head>
<body>
    <div id="app"></div>
    <script type="module" src="./src/index.js"></script>
    <script src="https://lwc-annotator-dist-bf13a8a6d953.herokuapp.com/lwc-annotator.js"></script>
    <style id="cosmos-light-overrides">
        body.cosmos-light,
        body.cosmos-light #app,
        body.cosmos-light shell-app,
        body.cosmos-light .global-shell,
        body.cosmos-light .global-header,
        body.cosmos-light .slds-global-header,
        body.cosmos-light .app-body,
        body.cosmos-light .app-main,
        body.cosmos-light .app-body__scroll-wrapper,
        body.cosmos-light .app-body__content-cell,
        body.cosmos-light .slds-section,
        body.cosmos-light .vertical-nav {
            background-color: transparent !important;
            background: transparent !important;
        }
        body.cosmos-light .global-shell {
            background: rgba(255, 255, 255, 0.22) !important;
            border: 2px solid rgba(255, 255, 255, 0.34) !important;
            border-radius: 12px !important;
            -webkit-backdrop-filter: blur(20px) !important;
            backdrop-filter: blur(20px) !important;
        }
        body.cosmos-light .global-shell::before {
            display: none !important;
        }
        body.cosmos-light .vertical-nav {
            background: rgba(255, 255, 255, 0.30) !important;
            border: 2px solid rgba(255, 255, 255, 0.40) !important;
            border-radius: 12px !important;
            -webkit-backdrop-filter: blur(40px) !important;
            backdrop-filter: blur(40px) !important;
        }
        body.cosmos-light .slds-card {
            background: rgba(255, 255, 255, 0.22) !important;
            border: 2px solid rgba(255, 255, 255, 0.34) !important;
            border-radius: 12px !important;
        }
        body.cosmos-light .slds-panel {
            background: rgba(255, 255, 255, 0.22) !important;
            border: 2px solid rgba(255, 255, 255, 0.34) !important;
            border-radius: 12px !important;
            -webkit-backdrop-filter: blur(20px) !important;
            backdrop-filter: blur(20px) !important;
        }
        body.cosmos-light .slds-global-header__item_search .slds-input {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(0, 0, 0, 0.35) !important;
            border-radius: 50rem !important;
            -webkit-backdrop-filter: blur(10px) !important;
            backdrop-filter: blur(10px) !important;
            color: rgba(0, 0, 0, 0.7) !important;
        }
        body.cosmos-light .slds-global-header__item_search .slds-input::placeholder {
            color: rgba(0, 0, 0, 0.4) !important;
        }
        body.cosmos-light .slds-input,
        body.cosmos-light .slds-textarea,
        body.cosmos-light .slds-combobox__input,
        body.cosmos-light .slds-select {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(0, 0, 0, 0.35) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            backdrop-filter: blur(10px) !important;
        }
        body.cosmos-light .slds-input:hover,
        body.cosmos-light .slds-textarea:hover,
        body.cosmos-light .slds-combobox__input:hover,
        body.cosmos-light .slds-select:hover {
            background: rgba(0, 0, 0, 0.04) !important;
            border-color: rgba(0, 0, 0, 0.50) !important;
            color: rgba(0, 0, 0, 0.85) !important;
        }
        body.cosmos-light .slds-input::placeholder,
        body.cosmos-light .slds-textarea::placeholder,
        body.cosmos-light .slds-combobox__input::placeholder {
            color: rgba(0, 0, 0, 0.4) !important;
        }
        body.cosmos-light .slds-input:hover::placeholder,
        body.cosmos-light .slds-textarea:hover::placeholder,
        body.cosmos-light .slds-combobox__input:hover::placeholder {
            color: rgba(0, 0, 0, 0.55) !important;
        }
        lightning-card,
        .slds-card,
        .slds-card__body,
        lightning-layout,
        .slds-grid,
        .slds-wrap,
        lightning-layout-item,
        .slds-col,
        .app-body__content-cell,
        .app-body__scroll-wrapper {
            overflow: visible !important;
        }
        body.cosmos-light .slds-dropdown,
        body.cosmos-light .slds-combobox .slds-listbox {
            background: rgba(255, 255, 255, 0.22) !important;
            border: 1px solid rgba(0, 0, 0, 0.35) !important;
            border-radius: 12px !important;
            -webkit-backdrop-filter: blur(20px) !important;
            backdrop-filter: blur(20px) !important;
            box-shadow: 0 8px 32px -4px rgba(0, 0, 0, 0.15) !important;
        }
    </style>
</body>
</html>
