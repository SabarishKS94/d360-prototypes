<template>
    <div class="settings-container">

        <!-- Hero Section -->
        <div class="settings-hero">
            <h2 class="hero-headline">{labels.HeroHeadline}</h2>
            <p class="hero-subtext">{labels.HeroSubtext}</p>
            <template lwc:if={showOrgNotification}>
                <div class="scoped-notification">
                    <lightning-icon icon-name="utility:alert" size="x-small" class="notification-icon"></lightning-icon>
                    <span class="notification-text">{labels.OrgCalloutText}</span>
                    <a href="#" class="notification-link" onclick={handleEnableNow}>{labels.OrgCalloutLinkText}</a>
                </div>
            </template>
        </div>

        <!-- Feature Card: Drift Tracking -->
        <div class="feature-card-wrapper">
            <div class="feature-card">
                <div class="feature-card-content">
                    <div class="feature-card-header">
                        <lightning-icon icon-name="standard:shipment" size="small" class="feature-icon"></lightning-icon>
                        <span class="feature-title">{labels.DriftTrackingTitle}</span>
                    </div>
                    <p class="feature-description">{labels.DriftTrackingDescription}</p>
                </div>
                <div class="feature-card-action">
                    <button class={driftButtonClass} disabled={isDriftDisabled} onclick={handleDriftToggle}>
                        <template lwc:if={driftEnabled}>
                            <span class="btn-enabled-state">&#10003; {labels.EnabledBadge}</span>
                            <span class="btn-hover-state">&#10005; {labels.DisableButton}</span>
                        </template>
                        <template lwc:else>
                            <span>{labels.EnableButton}</span>
                        </template>
                    </button>
                </div>
            </div>
            <template lwc:if={showPreview}>
                <div class="feature-preview">
                    <p class="preview-title">{labels.PreviewTitle}</p>
                    <p class="preview-description">{labels.DriftPreviewText}</p>
                    <div class="preview-image">
                        <img src="https://www.figma.com/api/mcp/asset/98807d88-b35f-40ca-bb8c-85abf02c325e" alt="Drift Tracking Preview">
                    </div>
                </div>
            </template>
        </div>

        <!-- Feature Card: NBA -->
        <div class="feature-card-wrapper">
            <div class="feature-card">
                <div class="feature-card-content">
                    <div class="feature-card-header">
                        <lightning-icon icon-name="standard:agent_astro" size="small" class="feature-icon"></lightning-icon>
                        <span class="feature-title">{labels.NbaTitle}</span>
                    </div>
                    <p class="feature-description">{labels.NbaDescription}</p>
                </div>
                <div class="feature-card-action">
                    <button class={nbaButtonClass} disabled={isNbaDisabled} onclick={handleNbaToggle}>
                        <template lwc:if={nbaEnabled}>
                            <span class="btn-enabled-state">&#10003; {labels.EnabledBadge}</span>
                            <span class="btn-hover-state">&#10005; {labels.DisableButton}</span>
                        </template>
                        <template lwc:else>
                            <span>{labels.EnableButton}</span>
                        </template>
                    </button>
                </div>
            </div>
            <template lwc:if={showPreview}>
                <div class="feature-preview">
                    <p class="preview-title">{labels.PreviewTitle}</p>
                    <p class="preview-description">{labels.NbaPreviewText}</p>
                    <div class="preview-image preview-image_rounded">
                        <img src="https://www.figma.com/api/mcp/asset/2f3e4bb7-af38-4d07-90f6-2e09e4c59e66" alt="NBA Card Preview">
                    </div>
                </div>
            </template>
        </div>


        <!-- Confirmation Modal (enable + disable) -->
        <ui-enable-modal
            feature-name={pendingFeature}
            visible={showModal}
            is-disabling={isDisabling}
            onclose={handleModalClose}
            onconfirm={handleModalConfirm}
        ></ui-enable-modal>
    </div>
</template>
