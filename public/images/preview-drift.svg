<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" fill="none">
  <!-- Card background -->
  <rect width="640" height="340" rx="8" fill="white" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Title row -->
  <text x="24" y="32" font-family="system-ui, -apple-system" font-size="13" font-weight="600" fill="#03234d">Prediction Drift Over Time</text>
  <circle cx="210" cy="28" r="7" fill="none" stroke="#0176d3" stroke-width="1.5"/>
  <text x="210" y="32" text-anchor="middle" font-family="system-ui" font-size="9" fill="#0176d3">i</text>

  <!-- Subtitle -->
  <text x="24" y="52" font-family="system-ui" font-size="11" fill="#5c5c5c">Monitors the stability of model predictions across versions to detect performance decay.</text>

  <!-- Y-axis labels -->
  <text x="20" y="90" font-family="system-ui" font-size="9" fill="#5c5c5c">2.0</text>
  <text x="20" y="130" font-family="system-ui" font-size="9" fill="#5c5c5c">1.6</text>
  <text x="20" y="170" font-family="system-ui" font-size="9" fill="#5c5c5c">1.2</text>
  <text x="20" y="210" font-family="system-ui" font-size="9" fill="#5c5c5c">0.8</text>
  <text x="20" y="250" font-family="system-ui" font-size="9" fill="#5c5c5c">0.4</text>
  <text x="20" y="285" font-family="system-ui" font-size="9" fill="#5c5c5c">0</text>

  <!-- Y-axis label rotated -->
  <text x="10" y="185" font-family="system-ui" font-size="9" fill="#5c5c5c" transform="rotate(-90 10 185)">Drift Score (PSI)</text>

  <!-- Grid lines -->
  <line x1="45" y1="86" x2="600" y2="86" stroke="#f0f0f0" stroke-width="0.5"/>
  <line x1="45" y1="126" x2="600" y2="126" stroke="#f0f0f0" stroke-width="0.5"/>
  <line x1="45" y1="166" x2="600" y2="166" stroke="#f0f0f0" stroke-width="0.5"/>
  <line x1="45" y1="206" x2="600" y2="206" stroke="#f0f0f0" stroke-width="0.5"/>
  <line x1="45" y1="246" x2="600" y2="246" stroke="#f0f0f0" stroke-width="0.5"/>
  <line x1="45" y1="282" x2="600" y2="282" stroke="#c9c9c9" stroke-width="0.5"/>

  <!-- Alert threshold line (orange) -->
  <line x1="45" y1="226" x2="600" y2="226" stroke="#dd7a01" stroke-width="1.5"/>

  <!-- Good threshold line (green) -->
  <line x1="45" y1="262" x2="600" y2="262" stroke="#2e844a" stroke-width="1.5"/>

  <!-- Version markers (vertical lines) -->
  <line x1="100" y1="70" x2="100" y2="282" stroke="#c9c9c9" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="280" y1="70" x2="280" y2="282" stroke="#c9c9c9" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="480" y1="70" x2="480" y2="282" stroke="#c9c9c9" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Data line (blue) -->
  <polyline points="80,170 140,165 200,95 280,280 360,166 440,200 520,170 580,175" stroke="#0176d3" stroke-width="2" fill="none"/>

  <!-- Data points -->
  <circle cx="80" cy="170" r="4" fill="#0176d3"/>
  <circle cx="140" cy="165" r="4" fill="#0176d3"/>
  <circle cx="200" cy="95" r="4" fill="#0176d3"/>
  <circle cx="280" cy="280" r="4" fill="#0176d3"/>
  <circle cx="360" cy="166" r="4" fill="#0176d3"/>
  <circle cx="440" cy="200" r="4" fill="#0176d3"/>
  <circle cx="520" cy="170" r="4" fill="#0176d3"/>
  <circle cx="580" cy="175" r="4" fill="#0176d3"/>

  <!-- Version labels at bottom -->
  <rect x="80" y="284" width="20" height="14" rx="2" fill="#03234d"/>
  <text x="90" y="294" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">v1</text>

  <rect x="265" y="284" width="20" height="14" rx="2" fill="#03234d"/>
  <text x="275" y="294" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">v3</text>

  <rect x="455" y="284" width="55" height="14" rx="2" fill="#03234d"/>
  <text x="482" y="294" text-anchor="middle" font-family="system-ui" font-size="8" fill="white">v4 (Active)</text>

  <!-- X-axis date labels -->
  <text x="80" y="312" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">2 Jan 2026</text>
  <text x="200" y="312" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">9 Jan 2026</text>
  <text x="320" y="312" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">16 Jan 2026</text>
  <text x="440" y="312" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">23 Jan 2026</text>
  <text x="560" y="312" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">30 Jan 2026</text>

  <!-- X-axis label -->
  <text x="320" y="332" text-anchor="middle" font-family="system-ui" font-size="10" fill="#5c5c5c">Date</text>

  <!-- Legend -->
  <rect x="44" y="260" width="8" height="8" rx="1" fill="#dd7a01"/>
  <text x="56" y="268" font-family="system-ui" font-size="9" fill="#5c5c5c">Alert</text>
  <rect x="44" y="274" width="8" height="8" rx="1" fill="#2e844a"/>
  <text x="56" y="282" font-family="system-ui" font-size="9" fill="#5c5c5c">Good</text>

  <!-- Legend bottom -->
  <circle cx="290" cy="330" r="4" fill="#0176d3"/>
  <text x="298" y="334" font-family="system-ui" font-size="9" fill="#5c5c5c">Live Data</text>
</svg>
