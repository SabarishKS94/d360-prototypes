<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" fill="none">
  <rect width="600" height="200" rx="8" fill="#f3f3f3"/>
  <!-- Card outline -->
  <rect x="40" y="20" width="520" height="160" rx="12" fill="white" stroke="#c9c9c9" stroke-width="1"/>
  <!-- Sparkle icon -->
  <circle cx="72" cy="48" r="12" fill="#e1f5fe"/>
  <text x="72" y="53" text-anchor="middle" font-family="system-ui" font-size="14" fill="#0176d3">&#10022;</text>
  <!-- Title -->
  <text x="92" y="52" font-family="system-ui" font-size="13" font-weight="600" fill="#03234d">What to do next?</text>
  <!-- Progress dots -->
  <circle cx="80" cy="90" r="8" fill="none" stroke="#0176d3" stroke-width="3"/>
  <line x1="88" y1="90" x2="170" y2="90" stroke="#c9c9c9" stroke-width="2"/>
  <circle cx="178" cy="90" r="5" fill="#c9c9c9"/>
  <line x1="183" y1="90" x2="265" y2="90" stroke="#c9c9c9" stroke-width="2"/>
  <circle cx="273" cy="90" r="5" fill="#c9c9c9"/>
  <line x1="278" y1="90" x2="360" y2="90" stroke="#c9c9c9" stroke-width="2"/>
  <circle cx="368" cy="90" r="5" fill="#c9c9c9"/>
  <line x1="373" y1="90" x2="455" y2="90" stroke="#c9c9c9" stroke-width="2"/>
  <circle cx="463" cy="90" r="5" fill="#c9c9c9"/>
  <!-- Stage labels -->
  <text x="80" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">Training</text>
  <text x="178" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">Activation</text>
  <text x="273" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">Inference Setup</text>
  <text x="368" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">Inference Exec</text>
  <text x="463" y="115" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">Monitoring</text>
  <!-- NBA text -->
  <text x="80" y="145" font-family="system-ui" font-size="12" font-weight="600" fill="#181818">Training in progress - no action needed right now.</text>
  <text x="80" y="163" font-family="system-ui" font-size="11" fill="#5c5c5c">Your first recommendation will appear once training completes.</text>
</svg>
