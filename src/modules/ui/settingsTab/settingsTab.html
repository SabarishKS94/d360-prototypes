<template>
    <div class="settings-container">

        <!-- Hero Section -->
        <div class="settings-hero">
            <h2 class="hero-headline">{labels.HeroHeadline}</h2>
            <p class="hero-subtext">{labels.HeroSubtext}</p>
            <template lwc:if={showOrgNotification}>
                <div class="org-callout">
                    <lightning-icon icon-name="utility:alert" size="xx-small" class="org-callout-icon"></lightning-icon>
                    <span class="org-callout-text">{labels.OrgCalloutText}</span>
                    <a href="#" class="org-callout-link" onclick={handleEnableNow}>{labels.OrgCalloutLinkText}</a>
                </div>
            </template>
        </div>

        <!-- Feature Card: Drift Tracking -->
        <div class="feature-card">
            <div class="feature-card-content">
                <div class="feature-card-header">
                    <lightning-icon icon-name="standard:shipment" size="small" class="feature-icon"></lightning-icon>
                    <span class="feature-title">{labels.DriftTrackingTitle}</span>
                </div>
                <p class="feature-description">{labels.DriftTrackingDescription}</p>
            </div>
            <div class="feature-card-action">
                <button class={driftButtonClass} disabled={isDriftDisabled} onclick={handleDriftToggle}>
                    <template lwc:if={driftEnabled}>
                        <span class="btn-enabled-state">&#10003; {labels.EnabledBadge}</span>
                        <span class="btn-hover-state">&#10005; {labels.DisableButton}</span>
                    </template>
                    <template lwc:else>
                        <span>{labels.EnableButton}</span>
                    </template>
                </button>
            </div>
        </div>

        <!-- Feature Card: NBA -->
        <div class="feature-card">
            <div class="feature-card-content">
                <div class="feature-card-header">
                    <lightning-icon icon-name="standard:agent_astro" size="small" class="feature-icon"></lightning-icon>
                    <span class="feature-title">{labels.NbaTitle}</span>
                </div>
                <p class="feature-description">{labels.NbaDescription}</p>
            </div>
            <div class="feature-card-action">
                <button class={nbaButtonClass} disabled={isNbaDisabled} onclick={handleNbaToggle}>
                    <template lwc:if={nbaEnabled}>
                        <span class="btn-enabled-state">&#10003; {labels.EnabledBadge}</span>
                        <span class="btn-hover-state">&#10005; {labels.DisableButton}</span>
                    </template>
                    <template lwc:else>
                        <span>{labels.EnableButton}</span>
                    </template>
                </button>
            </div>
        </div>

        <!-- Link to full Setup -->
        <div class="setup-link-row">
            <lightning-icon icon-name="utility:new_window" size="xx-small" class="setup-link-icon"></lightning-icon>
            <a href="#" class="setup-link" onclick={handleOpenSetup}>{labels.OpenSetupLink}</a>
        </div>

        <!-- Enable Confirmation Modal -->
        <ui-enable-modal
            feature-name={pendingFeature}
            visible={showModal}
            onclose={handleModalClose}
            onconfirm={handleModalConfirm}
        ></ui-enable-modal>
    </div>
</template>
