<template>
    <div class="theme-switcher slds-is-fixed slds-m-bottom_small slds-m-right_small">
        <lightning-button-icon
            icon-name="utility:palette"
            variant="border-filled"
            size="large"
            alternative-text="Theme options"
            title="Theme options"
            aria-haspopup="true"
            aria-expanded={isCardOpen}
            onclick={handleIconClick}>
        </lightning-button-icon>
        <template if:true={isCardOpen}>
            <div class="theme-switcher-backdrop" onclick={handleBackdropClick} role="presentation"></div>
            <div class="theme-switcher-card-wrapper">
                <lightning-card title="Theme" class="theme-switcher-card">
                    <div class="slds-p-around_small">
                        <div class="slds-button-group slds-m-bottom_small">
                            <lightning-button
                                variant="neutral"
                                label={darkModeLabel}
                                icon-name="utility:light_bulb"
                                onclick={handleToggleDarkModeClick}>
                            </lightning-button>
                        </div>
                        <div class="slds-button-group">
                            <lightning-button
                                variant={cosmosLightVariant}
                                label="Cosmos Light"
                                icon-name="utility:daylight"
                                onclick={handleCosmosLightClick}>
                            </lightning-button>
                            <lightning-button
                                variant={cosmosDarkVariant}
                                label="Cosmos Dark"
                                icon-name="utility:moon"
                                onclick={handleCosmosDarkClick}>
                            </lightning-button>
                        </div>
                    </div>
                </lightning-card>
            </div>
        </template>
    </div>
</template>
