<template>
    <lightning-layout class="slds-global-header global-header" horizontal-align="spread" vertical-align="center">
        <lightning-layout-item class="slds-global-header__item">
            <lightning-icon icon-name="utility:salesforce1" alternative-text={labels.Salesforce} size="large"></lightning-icon>
            <span class="slds-assistive-text">{labels.Salesforce}</span>
        </lightning-layout-item>
        <lightning-layout-item class="slds-global-header__item slds-global-header__item_search" flexibility="auto">
            <lightning-input type="search" label={labels.Search} placeholder={labels.SearchPlaceholder} variant="label-hidden"
                class="slds-container_small slds-container_center"></lightning-input>
        </lightning-layout-item>
        <lightning-layout-item class="slds-global-header__item customize-slds-button">
            <lightning-layout vertical-align="center">
                <lightning-layout-item>
                    <lightning-button-icon icon-name="utility:agent_astro" aria-haspopup="true" title={labels.Agentforce}
                        variant="container" onclick={handleAgentforceClick}>
                    </lightning-button-icon>
                </lightning-layout-item>
                <lightning-layout-item>
                    <lightning-button-icon icon-name="utility:trailhead_alt" aria-haspopup="true"
                        title={labels.GuidanceCenter} variant="container" onclick={handleTrailheadClick}>
                    </lightning-button-icon>
                </lightning-layout-item>
                <lightning-layout-item>
                    <lightning-button-menu icon-name="utility:help" title={labels.SalesforceHelp} variant="container"
                        nubbin="true" menu-alignment="right">
                    </lightning-button-menu>
                </lightning-layout-item>
                <lightning-layout-item>
                    <lightning-button-icon icon-name="utility:settings" aria-haspopup="true" title={labels.Setup}
                        variant="container" onclick={handleSettingsClick}>
                    </lightning-button-icon>
                </lightning-layout-item>
                <lightning-layout-item>
                    <lightning-button-icon icon-name="utility:notification" aria-haspopup="true" title={labels.Notifications}
                        variant="container" onclick={handleNotificationClick}>
                    </lightning-button-icon>
                </lightning-layout-item>
                <lightning-layout-item class="slds-p-left_small">
                    <shell-user-menu user={user}></shell-user-menu>
                </lightning-layout-item>
            </lightning-layout>
        </lightning-layout-item>
    </lightning-layout>
</template>
