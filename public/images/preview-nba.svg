<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" fill="none">
  <!-- Card background -->
  <rect width="640" height="180" rx="8" fill="white" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Sparkle icon -->
  <text x="24" y="34" font-family="system-ui" font-size="16" fill="#0176d3">&#10022;</text>
  <!-- Title -->
  <text x="44" y="34" font-family="system-ui, -apple-system" font-size="14" font-weight="600" fill="#03234d">What to do next?</text>

  <!-- Refreshed text -->
  <text x="616" y="34" text-anchor="end" font-family="system-ui" font-size="10" fill="#5c5c5c">Refreshed 6 days ago</text>

  <!-- Progress track -->
  <!-- Training dot (current - ring) -->
  <circle cx="60" cy="70" r="7" fill="none" stroke="#0176d3" stroke-width="3"/>
  <!-- Bar 1 -->
  <line x1="67" y1="70" x2="170" y2="70" stroke="#c9c9c9" stroke-width="2"/>
  <!-- Activation dot (red/current) -->
  <circle cx="180" cy="70" r="6" fill="#e3004e"/>
  <!-- Bar 2 -->
  <line x1="186" y1="70" x2="290" y2="70" stroke="#c9c9c9" stroke-width="2"/>
  <!-- Inference Setup dot -->
  <circle cx="300" cy="70" r="4" fill="#c9c9c9"/>
  <!-- Bar 3 -->
  <line x1="304" y1="70" x2="410" y2="70" stroke="#c9c9c9" stroke-width="2"/>
  <!-- Inference Execution dot -->
  <circle cx="420" cy="70" r="4" fill="#c9c9c9"/>
  <!-- Bar 4 -->
  <line x1="424" y1="70" x2="530" y2="70" stroke="#c9c9c9" stroke-width="2"/>
  <!-- Monitoring dot -->
  <circle cx="540" cy="70" r="4" fill="#c9c9c9"/>

  <!-- Stage labels -->
  <text x="60" y="92" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">Training</text>
  <text x="60" y="104" text-anchor="middle" font-family="system-ui" font-size="8" font-style="italic" fill="#5c5c5c">20 days ago</text>
  <text x="180" y="92" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">Activation</text>
  <text x="300" y="92" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">Inference Setup</text>
  <text x="420" y="92" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">Inference Execution</text>
  <text x="540" y="92" text-anchor="middle" font-family="system-ui" font-size="9" fill="#5c5c5c">Monitoring</text>

  <!-- NBA title -->
  <text x="24" y="130" font-family="system-ui" font-size="12" font-weight="600" fill="#181818">Model idle for 14 days since latest version trained. Activate now. Retrain later for better accuracy.</text>
  <!-- Info icon -->
  <circle cx="582" cy="126" r="6" fill="none" stroke="#747474" stroke-width="1"/>
  <text x="582" y="130" text-anchor="middle" font-family="system-ui" font-size="8" fill="#747474">i</text>

  <!-- Description -->
  <text x="24" y="150" font-family="system-ui" font-size="11" fill="#5c5c5c">Version 1 achieved 0.38 AUC — below random (0.50). Predictions are unreliable at this level. Safe to test on a small segment.</text>

  <!-- CTA button -->
  <rect x="540" y="120" width="85" height="28" rx="14" fill="none" stroke="#0176d3" stroke-width="1.5"/>
  <text x="582" y="138" text-anchor="middle" font-family="system-ui" font-size="11" fill="#0176d3">Activate Now</text>
</svg>
